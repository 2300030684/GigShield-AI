spring.application.name=trustpay-backend

# H2 DATABASE CONFIGURATION (Persistent)
spring.datasource.url=jdbc:h2:file:./data/trustpay_db;DB_CLOSE_DELAY=-1
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA / HIBERNATE
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# EXTERNAL APIs
weather.api.key=fd75a6170acc3ea58cc247f5682253e6
weather.api.base=https://api.openweathermap.org/data/2.5

# SERVER
server.port=8080

# JWT SECURITY
trustpay.app.jwtSecret=TrustPayUltraSecretKeyForDemo2026SecureString
trustpay.app.jwtExpirationMs=86400000

# PYTHON FLASK ML API
# Start ml/app.py on port 5001 before running Spring Boot
ml.flask.url=http://localhost:5001

# SCHEDULING (enable @Scheduled)
spring.task.scheduling.enabled=true

# LOGGING — reduce noise for demo
logging.level.root=WARN
logging.level.com.trustpay=INFO
logging.level.com.trustpay.backend.service.WeatherScheduler=INFO
logging.level.com.trustpay.backend.service.AIModelService=INFO
